version: "3.9"

services:

  mongo:
    image: mongo:6
    container_name: mern_mongo
    restart: always
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: mern_backend
    restart: always
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/mern-docker
      - PORT=5000

  frontend:
    build: ./frontend
    container_name: mern_frontend
    restart: always
    depends_on:
      - backend

    volumes:
      - ./frontend:/app

  nginx:
    image: nginx:alpine
    container_name: mern_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  mongo_data: