version: "3.9"

services:
  mongo:
    image: mongo:6
    container_name: mern_mongo
    restart: always
    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: mern_backend
    restart: always
    ports: 
      - "5000:5000"
    depends_on:
      - mongo

    environment:
      - MONGO_URI=mongodb://mongo:27017/mern-docker
      - PORT=5000
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: mern_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:

# To run the application, use the following command in the terminal:
# docker-compose up --build